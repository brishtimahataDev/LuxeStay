<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join LuxeStay | Start Your Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --brand: #2563eb;
            --dark: #0f172a;
            --text-main: #334155;
            --text-light: #94a3b8;
            --bg: #f8fafc;
            --white: #ffffff;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--white);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Left Side: Visual --- */
        .split-visual {
            flex: 1;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)),
                url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
            color: white;
        }

        .split-visual h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .split-visual p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 450px;
            line-height: 1.6;
        }

        /* --- Right Side: Form --- */
        .split-form {
            width: 550px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--brand);
            text-decoration: none;
            margin-bottom: 40px;
            display: block;
        }

        .form-header {
            margin-bottom: 30px;
        }

        .form-header h1 {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-signup {
            width: 100%;
            background: var(--brand);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            transition: 0.3s;
        }

        .btn-signup:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-social {
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-social:hover {
            background: #f8fafc;
        }

        .footer-text {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .footer-text a {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
        }

        /* --- Responsive --- */
        @media (max-width: 1000px) {
            .split-visual {
                display: none;
            }

            .split-form {
                width: 100%;
                max-width: 600px;
                margin: 0 auto;
                padding: 40px 20px;
            }

            body {
                overflow-y: auto;
            }
        }
    </style>
</head>

<body>

    <div class="split-visual">
        <h2>Unforgettable stays await.</h2>
        <p>Join over 2 million travelers who book their luxury retreats and boutique experiences through LuxeStay.</p>
    </div>

    <div class="split-form">
        <a href="index.html" class="logo">LuxeStay</a>

        <div class="form-header">
            <h1>Create your account</h1>
            <p>Join the circle of elite travelers today.</p>
        </div>

        <form>
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="far fa-user"></i>
                    <input type="text" placeholder="John Doe" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="far fa-lock"></i>
                    <input type="password" placeholder="At least 8 characters" required>
                </div>
            </div>


            <button type="submit" class="btn-signup">Create Account</button>
        </form>





        <p class="footer-text">
            Already have an account? <a href="login.html">Log in here</a>
        </p>
    </div>

</body>

</html>
