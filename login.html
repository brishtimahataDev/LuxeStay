<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LuxeStay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --brand: #2563eb;
            --dark: #0f172a;
            --text-main: #334155;
            --text-light: #94a3b8;
            --bg: #f8fafc;
            --white: #ffffff;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--white);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Left Side: Welcome Back Visual --- */
        .split-visual {
            flex: 1;
            background: linear-gradient(rgba(15, 23, 42, 0.3), rgba(15, 23, 42, 0.5)),
                url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
        }

        .split-visual h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .split-visual p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 400px;
            line-height: 1.6;
            font-weight: 300;
        }

        /* --- Right Side: Login Form --- */
        .split-form {
            width: 500px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--white);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--brand);
            text-decoration: none;
            margin-bottom: 50px;
            display: inline-block;
            letter-spacing: -1px;
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            outline: none;
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--brand);
            background: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.05);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-main);
        }

        .forgot-pass {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        .btn-login:hover {
            background: var(--brand);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
        }

        .divider {
            margin: 35px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #f1f5f9;
        }

        .divider:not(:empty)::before {
            margin-right: 20px;
        }

        .divider:not(:empty)::after {
            margin-left: 20px;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--dark);
            transition: 0.3s;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .footer-text {
            text-align: center;
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .footer-text a {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 1100px) {
            .split-visual {
                display: none;
            }

            .split-form {
                width: 100%;
                max-width: 550px;
                margin: 0 auto;
                padding: 40px;
            }

            body {
                overflow-y: auto;
            }
        }
    </style>
</head>

<body>

    <div class="split-visual">
        <h2>Welcome back to the extraordinary.</h2>
        <p>Your next escape is just a few clicks away. Log in to access your saved trips and exclusive member rates.</p>
    </div>

    <div class="split-form">
        <a href="index.html" class="logo">LuxeStay</a>

        <div class="form-header">
            <h1>Sign in</h1>
            <p>Enter your details to access your account.</p>
        </div>

        <form>
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" placeholder="name@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="far fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>



            <button type="submit" class="btn-login">Sign In</button>
        </form>





        <p class="footer-text">
            Don't have an account? <a href="signup.html">Create one for free</a>
        </p>
    </div>

</body>

</html>
